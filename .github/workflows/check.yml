name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  check-common:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Check for changes after npm i
        run: "[[ `git status --porcelain` ]] && exit 1 || exit 0"

      - name: Check
        run: npm run check
