name: main

on:
  push:
    branches:
      - main

jobs:
  Check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check
